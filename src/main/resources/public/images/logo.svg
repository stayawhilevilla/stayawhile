<svg width="300" height="300" viewBox="0 0 300 300" xmlns="http://www.w3.org/2000/svg">
  <style>
    .main-text {
      font-family: "Helvetica Neue", Arial, sans-serif;
      font-size: 150px;
      font-weight: 100; /* ultra-thin */
      fill: #111;
      letter-spacing: 4px;
    }
    .subtext {
      font-family: Arial, Helvetica, sans-serif;
      font-size: 14px;
      fill: #888;
      letter-spacing: 3px;
    }
  </style>

  <!-- Thin SA -->
  <text x="50%" y="52%" text-anchor="middle" dominant-baseline="middle" class="main-text">
    SA
  </text>

  <!-- Subtitle -->
  <text x="50%" y="75%" text-anchor="middle" class="subtext">
    BY STAY AWHILE VILLAS
  </text>
</svg>